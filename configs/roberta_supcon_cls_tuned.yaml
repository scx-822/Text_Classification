model_name: models/hfl_chinese_roberta_wwm_ext
train_path: Dataset/roberta_train.xlsx
test_path: Dataset/roberta_test.xlsx
output_dir: outputs/roberta_supcon_cls_tuned
max_length: 256
pooling: cls
batch_size: 16
eval_batch_size: 32
gradient_accumulation_steps: 2
learning_rate: 3.0e-05
epochs: 8
warmup_ratio: 0.1
weight_decay: 0.01
max_grad_norm: 1.0
dropout: 0.1
classification_loss: cross_entropy
contrastive_loss: supervised_contrastive
contrastive_dim: 128
temperature: 0.07
lambda_contrast: 0.1
validation_split: 0.2
split_strategy: group_aware_split_if_feasible
main_metric: accuracy
early_stopping_patience: 2
seed: 42
